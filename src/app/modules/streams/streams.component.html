<div class="page-container">
  <h2 class="page-title">Stream Management</h2>
  <div class="layout-row">
    <mat-card class="form-card">
      <h3>{{editId ? 'Edit Stream' : 'Add Stream'}}</h3>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Stream Name</mat-label>
        <input matInput [(ngModel)]="formName" placeholder="e.g. Science, Commerce">
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Faculty</mat-label>
        <mat-select [(ngModel)]="formFacultyId">
          <mat-option *ngFor="let f of faculties" [value]="f.id">{{f.name}}</mat-option>
        </mat-select>
      </mat-form-field>
      <div class="form-actions">
        <button mat-raised-button color="primary" (click)="save()">{{editId?'Update':'Add'}}</button>
        <button mat-button (click)="reset()" *ngIf="editId">Cancel</button>
      </div>
    </mat-card>
    <mat-card class="table-card flex-1">
      <table mat-table [dataSource]="streams" class="full-width">
        <ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>#</th><td mat-cell *matCellDef="let r">{{r.id}}</td></ng-container>
        <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Stream</th><td mat-cell *matCellDef="let r">{{r.name}}</td></ng-container>
        <ng-container matColumnDef="faculty"><th mat-header-cell *matHeaderCellDef>Faculty</th><td mat-cell *matCellDef="let r">{{r.facultyName}}</td></ng-container>
        <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let r">
          <button mat-icon-button color="primary" (click)="edit(r)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="delete(r.id)"><mat-icon>delete</mat-icon></button>
        </td></ng-container>
        <tr mat-header-row *matHeaderRowDef="cols"></tr>
        <tr mat-row *matRowDef="let row; columns: cols;"></tr>
      </table>
      <p class="empty" *ngIf="!streams.length">No streams found.</p>
    </mat-card>
  </div>
</div>
