<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <mat-icon class="school-icon">school</mat-icon>
      <h1>School Management System</h1>
      <p>Result Management System</p>
    </div>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <mat-icon matPrefix>person</mat-icon>
        <input matInput [(ngModel)]="username" placeholder="Enter username" (keyup.enter)="login()">
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input matInput [type]="hide?'password':'text'" [(ngModel)]="password" (keyup.enter)="login()">
        <button mat-icon-button matSuffix (click)="hide=!hide">
          <mat-icon>{{hide?'visibility_off':'visibility'}}</mat-icon>
        </button>
      </mat-form-field>
      <p class="error-msg" *ngIf="error">{{error}}</p>
      <button mat-raised-button color="primary" class="full-width login-btn" (click)="login()" [disabled]="loading">
        <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
        <span *ngIf="!loading">LOGIN</span>
      </button>
    </mat-card-content>
  </mat-card>
</div>
