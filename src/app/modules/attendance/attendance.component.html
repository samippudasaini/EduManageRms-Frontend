<div class="page-container">
  <h2 class="page-title">Attendance Management</h2>
  <p class="page-sub">Select a class to manage attendance.</p>
  <div class="loading" *ngIf="loading">Loading...</div>
  <div class="cards-grid" *ngIf="!loading">
    <mat-card class="class-card" *ngFor="let gs of sections">
      <div class="card-top">
        <mat-icon class="card-icon">class</mat-icon>
        <div class="card-info">
          <h3>Grade {{ gs.gradeName }}
            <span *ngIf="gs.sectionName"> — {{ gs.sectionName }}</span>
          </h3>
          <p>{{ gs.studentCount }} students</p>
        </div>
      </div>
      <div class="card-actions">
        <a mat-raised-button color="primary"
          [routerLink]="['/attendance/monthly', gs.id]">
          <mat-icon>grid_on</mat-icon> Daily Grid
        </a>
        <a mat-stroked-button color="primary"
          [routerLink]="['/attendance/summary', gs.id]">
          <mat-icon>summarize</mat-icon> Monthly Summary
        </a>
      </div>
    </mat-card>
  </div>
  <div class="empty-state" *ngIf="!loading && !sections.length">
    <mat-icon>class</mat-icon>
    <p>No classes found. Add grades and sections first.</p>
  </div>
</div>
